<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District Reading Progress Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f4f0;
  --color-background-tertiary: #fafaf8;
  --color-background-info: #E6F1FB;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666663;
  --color-text-tertiary: #999996;
  --color-text-info: #185FA5;
  --color-border-primary: rgba(0,0,0,0.4);
  --color-border-secondary: rgba(0,0,0,0.3);
  --color-border-tertiary: rgba(0,0,0,0.15);
  --color-border-info: #85B7EB;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #2c2c2a;
    --color-background-secondary: #363633;
    --color-background-tertiary: #2c2c2a;
    --color-background-info: #0C447C;
    --color-text-primary: #f0efe8;
    --color-text-secondary: #a8a8a3;
    --color-text-tertiary: #7a7a76;
    --color-text-info: #85B7EB;
    --color-border-primary: rgba(255,255,255,0.4);
    --color-border-secondary: rgba(255,255,255,0.3);
    --color-border-tertiary: rgba(255,255,255,0.15);
    --color-border-info: #378ADD;
  }
}
html{background:var(--color-background-tertiary)}
body{font-family:var(--font-sans);margin:0;padding:2rem;color:var(--color-text-primary);max-width:780px;margin:0 auto}
*{box-sizing:border-box;margin:0;padding:0}
.dash{padding:0.5rem 0}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.mc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem 1rem}
.mc-l{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.mc-v{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.mc-s{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.mc-trend{font-size:12px;color:#639922;margin-top:4px}
.mc-trend .pos{font-weight:500}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--color-text-info);cursor:pointer;margin-bottom:1rem;background:none;border:none;font-family:var(--font-sans);padding:0}
.back-btn:hover{text-decoration:underline}
.view-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.view-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:0}
.seats{display:flex;align-items:center;gap:10px;flex-shrink:0;padding-top:2px;white-space:nowrap}
.seats-count{font-size:13px;color:var(--color-text-secondary)}
.seats-filled{font-size:13px;color:var(--color-text-tertiary)}
.seats-cta{font-size:13px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info);cursor:pointer;font-family:var(--font-sans)}
.seats-cta:hover{filter:brightness(0.97)}
@media (max-width:640px){.view-head{flex-direction:column;gap:8px}}
.sub-counts{font-size:13px;color:var(--color-text-secondary);padding:10px 0;margin-bottom:1.5rem;border-top:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);margin-top:8px}
.sub-counts span+span::before{content:"·";margin:0 8px;color:var(--color-text-tertiary)}
.gc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:16px;cursor:pointer;transition:border-color 0.15s}
.gc:hover{border-color:var(--color-border-secondary)}
.gc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.gc-name{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.gc-count{font-size:13px;color:var(--color-text-secondary);margin-left:8px}
.gc-arrow{font-size:18px;color:var(--color-text-tertiary)}
.gc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:40px 32px}
@media (max-width:899px){.gc-metrics{grid-template-columns:repeat(2,1fr)}}
.cm{padding:0;min-width:0}
.cm-name{font-size:13px;color:var(--color-text-primary);margin-bottom:12px}
.cm-bar-wrap{position:relative;margin-bottom:8px;padding-bottom:24px}
.cm-bar{height:28px;background:var(--color-background-secondary);border-radius:14px;position:relative;overflow:visible}
.cm-fill{position:absolute;top:0;height:100%;border-radius:14px 0 0 14px;z-index:2}
.cm-proj{position:absolute;top:0;height:100%;z-index:1;overflow:hidden}
.cm-proj-i{width:100%;height:100%}
.cm-start{position:absolute;top:4px;width:20px;height:20px;border-radius:50%;background:#ffffff;border:2px solid var(--color-text-tertiary);z-index:3}
.cm-target{position:absolute;top:-2px;height:34px;width:2px;border-radius:1px;background:var(--color-text-secondary);z-index:3}
.cm-pill{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:500;background:#ffffff;border:1px solid var(--color-border-tertiary);border-radius:10px;padding:2px 6px;z-index:5;white-space:nowrap;line-height:1.2;color:var(--color-text-primary)}
.cm-target-pill{position:absolute;top:32px;transform:translateX(-50%);font-size:11px;font-weight:500;background:#ffffff;border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:2px 6px;z-index:5;white-space:nowrap;line-height:1.2;color:var(--color-text-secondary)}
.cm-stats{text-align:center;font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.cm-stat{display:block;line-height:1.5}
.cm-stats b{font-weight:500}
.controls-row{display:flex;gap:8px;margin-bottom:1.5rem;align-items:center;flex-wrap:wrap}
.controls-buttons{display:flex;gap:8px;flex-wrap:wrap}
.controls-select{display:none;width:100%;font-size:13px;padding:8px 10px;font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md)}
.tb{padding:6px 14px;font-size:13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans)}
.tb.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.fl{font-size:12px;color:var(--color-text-secondary);margin-left:auto}
.tc{overflow-x:auto}
.legend{display:flex;gap:14px;margin-bottom:1.5rem;font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px}
.ld{width:8px;height:8px;border-radius:2px}
.ll{width:8px;height:2.5px;border-radius:1px}
.ls{width:16px;height:10px;border-radius:2px;background:repeating-linear-gradient(45deg,#888780 0px,#888780 2px,transparent 2px,transparent 6px)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:8px 10px;font-weight:500;font-size:12px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--color-text-primary)}
th .sa{font-size:10px;margin-left:3px;opacity:0.4}
th.sorted .sa{opacity:1}
td{padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
.sn{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tn{color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bw{display:flex;align-items:center;gap:8px}
.bb{width:100%;height:12px;background:var(--color-background-secondary);border-radius:6px;min-width:60px;overflow:visible;position:relative}
.bf{position:absolute;top:0;height:100%;border-radius:6px 0 0 6px;z-index:2}
.bp{position:absolute;top:0;height:100%;z-index:1;overflow:hidden}
.bp-i{width:100%;height:100%}
.bs{position:absolute;top:0;width:12px;height:12px;border-radius:50%;background:#ffffff;border:2px solid var(--color-text-tertiary);z-index:3}
.bl{position:absolute;top:-3px;height:18px;width:2px;z-index:3;border-radius:1px;background:var(--color-text-secondary)}
.bv{text-align:right;color:var(--color-text-secondary)}
.cv{text-align:right;font-weight:500}
.mastered-cell{text-align:left;color:var(--color-text-secondary);font-style:italic;padding-left:24px}
.sv{min-width:30px;text-align:right;font-size:13px;font-weight:500;white-space:nowrap}
.tw{margin-bottom:0.5rem}
@media (max-width:767px){
  td .bw{display:block;text-align:right}
  td .bb{display:none}
  th[data-sort="current"]{text-align:right;width:12% !important}
  th.ch,td.ch{display:none}
}
@media (max-width:599px){
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tw table{table-layout:auto;min-width:560px;border-collapse:separate;border-spacing:0}
  .tw th[data-sort="name"],.tw td.sn{position:sticky;left:0;background:var(--color-background-tertiary);z-index:1;border-right:0.5px solid var(--color-border-tertiary)}
  .tw th[data-sort="name"]{z-index:2}
}
.callout{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1.5rem 1.75rem;margin-bottom:1.5rem}
.callout-pers{font-size:18px;line-height:1.7;color:var(--color-text-primary);font-weight:400}
.callout-pers b{font-weight:700;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:2px 6px;white-space:nowrap}
.placeholder{text-decoration:underline dotted;text-decoration-color:var(--color-text-tertiary);text-underline-offset:3px;cursor:help}
.gv{font-size:13px;font-weight:500}
.pos{color:#639922}.neg{color:#E24B4A}
@media(prefers-color-scheme:dark){.pos{color:#97C459}.neg{color:#F09595}.mc-trend{color:#97C459}}
.pc{font-size:13px;white-space:nowrap}
.ps{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dc{font-size:13px;font-weight:500}
@media (max-width:640px){
  body{padding:1rem}
  .metrics-row{grid-template-columns:1fr}
  .gc-metrics{grid-template-columns:1fr}
  .controls-buttons{display:none}
  .controls-select{display:block}
  table{min-width:640px}
  th:first-child,tbody td:first-child{position:sticky;left:0;background:var(--color-background-tertiary);z-index:4}
}
</style>
</head>
<body>
<div class="dash" id="app"></div>
<script>
var MO=4,MT=10;
var GM={
k:{name:"Kindergarten",plural:"Kindergartners",metrics:{
wcpm:{n:"Words correct per minute",t:10,b:2,mx:15,u:"WCPM",cap:null,key:1},
hfw:{n:"High-frequency words",t:20,b:5,mx:25,u:"high-frequency words",cap:null,key:1},
pa:{n:"Phonological awareness",t:35,b:14,mx:45,u:"correct sound segments",cap:null,key:0},
lnf:{n:"Letter naming fluency",t:42,b:17,mx:55,u:"letters per minute",cap:null,key:0}}},
g1:{name:"1st Grade",plural:"1st Graders",metrics:{
wcpm:{n:"Words correct per minute",t:42,b:17,mx:58,u:"WCPM",cap:null,key:1},
hfw:{n:"High-frequency words",t:200,b:80,mx:220,u:"high-frequency words",cap:200,key:1},
pa:{n:"Phonological awareness",t:35,b:14,mx:45,u:"correct sound segments",cap:null,key:0},
lnf:{n:"Letter naming fluency",t:42,b:17,mx:55,u:"letters per minute",cap:null,key:0}}},
g2:{name:"2nd Grade",plural:"2nd Graders",metrics:{
wcpm:{n:"Words correct per minute",t:90,b:40,mx:110,u:"WCPM",cap:null,key:1},
hfw:{n:"High-frequency words",t:200,b:120,mx:220,u:"high-frequency words",cap:200,key:1},
pa:{n:"Phonological awareness",t:35,b:14,mx:45,u:"correct sound segments",cap:null,key:0},
lnf:{n:"Letter naming fluency",t:42,b:17,mx:55,u:"letters per minute",cap:null,key:0}}}
};
var GKS=['k','g1','g2'];

function rng(seed){var s=seed;return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

var FN=["Ava","Ben","Chloe","Dylan","Emma","Finn","Grace","Hugo","Aiden","Bella","Carlos","Daisy","Ethan","Fatima","Gabi","Henry","Izzy","Jayden","Kayla","Liam","Maya","Noah","Olivia","Preston","Quinn","Rosa","Sam","Tiana","Alex","Brooklyn","Charlie","Diana","Eli","Freya","George","Mia","Lucas","Sophia","Leo","Zara","Aria","Owen","Luna","Jack","Nora","Theo","Ivy","Max","Lily","Ryan","Harper","Cole","Stella","Wyatt","Ruby","Asher","Hazel","Mila","Caleb","Violet","Elijah","Scarlett","Nathan","Amelia","Logan","Penny","Miles","Clara","Ezra","Willow","Isaiah","Autumn","Jude","Sienna","Kai","Margot","Ravi","Priya","Yuki","Kenji","Luca","Ines","Omar","Leila","Soren","Jasper","Iris","Felix","Ada","Rowan","Sage"];
var LI=["A","B","C","D","E","F","G","H","J","K","L","M","N","P","R","S","T","V","W"];
var TN=["Ms. Rivera","Mr. Chen","Ms. Okafor","Mr. Patel","Ms. Lindgren","Mr. Davis","Ms. Tanaka","Mr. Kowalski","Ms. Hernandez","Mr. Brooks","Ms. Nguyen","Mr. Sullivan","Ms. Adeyemi","Mr. Frost","Ms. Kaplan","Mr. Reeves","Ms. Lombardi","Mr. Shah"];

var BOY_R={
k:{wcpm:[0,2],hfw:[0,5],pa:[1,8],lnf:[2,12]},
g1:{wcpm:[3,15],hfw:[8,38],pa:[30,45],lnf:[35,50]},
g2:{wcpm:[20,45],hfw:[60,120],pa:[38,45],lnf:[42,50]}
};

function genStudents(r,n,gk){
var mks=Object.keys(GM[gk].metrics);
var nTeachers=Math.max(1,Math.ceil(n/20));
var teachers=[];var usedT={};
for(var ti=0;ti<nTeachers;ti++){var tn;do{tn=TN[Math.floor(r()*TN.length)]}while(usedT[tn]);usedT[tn]=true;teachers.push(tn)}
var used={};var students=[];
for(var i=0;i<n;i++){
var nm;do{nm=FN[Math.floor(r()*FN.length)]+' '+LI[Math.floor(r()*LI.length)]+'.';}while(used[nm]);
used[nm]=true;
var s={name:nm,teacher:teachers[i%nTeachers]};
mks.forEach(function(mk){
var met=GM[gk].metrics[mk];
if(met.t===null){s[mk]={b:0,c:Math.floor(r()*(met.mx+1))};return}
var br=BOY_R[gk][mk];
var boy=Math.round(br[0]+r()*(br[1]-br[0]));
// Mastered: BOY already at or above the EOY target. No further growth tracked.
if(boy>=met.t){s[mk]={b:boy,c:boy,mastered:true};return}
var thr=boy+(met.t-boy)*0.4;
var cur;
if(r()<0.68){
var hi=met.cap?Math.min(met.cap,met.t*0.85):met.t*0.85;
cur=Math.round(thr+r()*Math.max(hi-thr,3));
}else{
cur=Math.round(boy+1+r()*Math.max(thr-boy-2,1));
}
if(met.cap)cur=Math.min(cur,met.cap);
cur=Math.max(boy+1,cur);
s[mk]={b:boy,c:cur};
});
students.push(s);
}
return students;
}

var DISTRICT_NAME="Riverside Unified School District";
var DMET={k:'wcpm',g1:'wcpm',g2:'wcpm'};
var DMET_LABEL={k:'WCPM',g1:'WCPM',g2:'WCPM'};

var SCFG=[
{name:"Lincoln Elementary",seed:42,k:8,g1:20,g2:7,seats:0},
{name:"Washington Elementary",seed:137,k:12,g1:28,g2:15,seats:3},
{name:"Jefferson Elementary",seed:256,k:0,g1:22,g2:10,seats:0},
{name:"Roosevelt Elementary",seed:389,k:6,g1:15,g2:0,seats:2},
{name:"Madison Elementary",seed:512,k:11,g1:25,g2:12,seats:0},
{name:"Adams Elementary",seed:731,k:0,g1:20,g2:0,seats:1}
];

var SCHOOLS=SCFG.map(function(cfg){
var r=rng(cfg.seed);
return{name:cfg.name,seats:cfg.seats,students:{
k:cfg.k>0?genStudents(r,cfg.k,'k'):[],
g1:cfg.g1>0?genStudents(r,cfg.g1,'g1'):[],
g2:cfg.g2>0?genStudents(r,cfg.g2,'g2'):[]}};
});

var st={view:'district',si:null,gk:null,gm:{},sort:'name',asc:true,filter:'all'};
SCHOOLS.forEach(function(s,i){st.gm[i]={k:'wcpm',g1:'wcpm',g2:'wcpm'};});

function sc(s){return s==='on-track'?'#639922':'#E24B4A'}
function proj(boy,cur,cap){var r=(cur-boy)/MO;var p=Math.round(boy+r*MT);if(cap!==null)p=Math.min(p,cap);return p}
function slBg(c){return'repeating-linear-gradient(45deg,'+c+' 0px,'+c+' 2px,transparent 2px,transparent 6px)'}

// Proxy formula for months-of-progress, pending real definition.
// Per-student: fraction of needed progress made, scaled to total school months.
function mopStudent(boy,cur,target,totalMonths){
if(target==null)return null;
if(target<=boy)return totalMonths;
var frac=Math.max(0,(cur-boy)/(target-boy));
return Math.min(totalMonths,frac*totalMonths);
}

// Compute callout stats for a list of {student, gk} items across given metric keys.
function calloutFor(scope,metricKeys){
var perMetric={};var allMops=[];
metricKeys.forEach(function(mk){perMetric[mk]=[]});
scope.forEach(function(it){
var g=GM[it.gk];
metricKeys.forEach(function(mk){
var m=g.metrics[mk];if(!m)return;
var d=it.student[mk];if(!d)return;
var cur=m.cap!=null?Math.min(d.c,m.cap):d.c;
perMetric[mk].push(cur-d.b);
var mop=mopStudent(d.b,cur,m.t,MT);
if(mop!=null)allMops.push(mop);
});
});
var r={count:scope.length,avgMonths:0,growths:{}};
if(allMops.length)r.avgMonths=Math.round(allMops.reduce(function(a,b){return a+b},0)/allMops.length);
metricKeys.forEach(function(mk){
var arr=perMetric[mk];
r.growths[mk]=arr.length?Math.round(arr.reduce(function(a,b){return a+b},0)/arr.length):0;
});
return r;
}

// Avg months of growth across a scope of {student, gk} items, using all key metrics with targets.
function avgMopFor(scope){
var mops=[];
scope.forEach(function(it){
var g=GM[it.gk];
Object.keys(g.metrics).forEach(function(mk){
var m=g.metrics[mk];if(!m.key||m.t==null)return;
var d=it.student[mk];if(!d)return;
var cur=m.cap!=null?Math.min(d.c,m.cap):d.c;
var mop=mopStudent(d.b,cur,m.t,MT);
if(mop!=null)mops.push(mop);
});
});
return mops.length?Math.round(mops.reduce(function(a,b){return a+b},0)/mops.length):0;
}

function calloutHtml(personalHtml){
if(!personalHtml)return '';
return '<div class="callout"><div class="callout-pers">'+personalHtml+'</div></div>';
}

function seatsBlock(seats){
if(seats>0)return '<div class="seats"><span class="seats-count">'+seats+' open seat'+(seats!==1?'s':'')+'</span><button class="seats-cta" type="button">Fill Seats</button></div>';
return '<div class="seats"><span class="seats-filled">All seats filled</span></div>';
}

// Aggregate stats for a metric (wcpm or hfw) across a scope of {student, gk} items.
// Real numbers — averaged regardless of grade. Target is the weighted average target
// across the same students. Mastered students excluded from avg growth but counted as
// "projected to meet target".
function metricAgg(scope,mk){
var boys=[],currs=[],projs=[],targets=[],growths=[],mx=0,projMet=0;
scope.forEach(function(it){
var m=GM[it.gk].metrics[mk];if(!m||m.t==null)return;
var d=gsd(it.student,it.gk,mk);if(!d)return;
boys.push(d.boy);currs.push(d.current);projs.push(d.projected);targets.push(m.t);
if(!d.mastered)growths.push(d.growth);
if(d.mastered||d.projected>=m.t)projMet++;
if(m.mx>mx)mx=m.mx;
});
if(!boys.length)return null;
function avg(a){return a.length?a.reduce(function(x,y){return x+y},0)/a.length:0}
return{
boy:Math.round(avg(boys)),current:Math.round(avg(currs)),
projected:Math.round(avg(projs)),target:Math.round(avg(targets)),
growth:Math.round(avg(growths)),projPct:Math.round(projMet/boys.length*100),
mx:mx,count:boys.length
};
}

function pickVisiblePills(specs){
// specs: array in priority order (highest first). Each item: {pct, label, full, key}
var threshold=14;var visible=[];
specs.forEach(function(p){
var collides=visible.some(function(v){return Math.abs(v.pct-p.pct)<threshold});
if(!collides)visible.push(p);
});
return visible;
}

function renderMetricChart(stats,title){
if(!stats||!stats.mx)return '<div class="cm"><div class="cm-name">'+title+'</div><div class="cm-stats" style="font-style:italic">No data</div></div>';
var mx=stats.mx;
var bp=Math.max(0,Math.min(100,stats.boy/mx*100));
var cp=Math.min(100,stats.current/mx*100);
var pp=Math.min(100,stats.projected/mx*100);
var tp=Math.min(100,stats.target/mx*100);
var status=stats.projected>=stats.target?'on-track':'below';
var col=sc(status);
// Priority: Start > Projected > Current > Target
var pillSpecs=[
{key:'start',pct:bp,label:stats.boy,full:'Start: '+stats.boy},
{key:'projected',pct:pp,label:stats.projected,full:'Projected: '+stats.projected},
{key:'current',pct:cp,label:stats.current,full:'Current: '+stats.current}
];
var visible=pickVisiblePills(pillSpecs);
var h='<div class="cm"><div class="cm-name">'+title+'</div><div class="cm-bar-wrap"><div class="cm-bar">';
if(pp>cp)h+='<div class="cm-proj" style="left:'+cp+'%;width:'+(pp-cp)+'%"><div class="cm-proj-i" style="background:'+slBg(col)+'"></div></div>';
h+='<div class="cm-fill" style="left:'+bp+'%;width:'+Math.max(0,cp-bp)+'%;background:'+col+'"></div>';
h+='<div class="cm-start" style="left:'+bp+'%;transform:translateX(-50%);border-color:'+col+'"></div>';
h+='<div class="cm-target" style="left:'+tp+'%"></div>';
visible.forEach(function(p){h+='<div class="cm-pill" style="left:'+p.pct+'%;border-color:'+col+'" title="'+p.full+'">'+p.label+'</div>'});
h+='</div><div class="cm-target-pill" style="left:'+tp+'%" title="Target: '+stats.target+'">'+stats.target+'</div></div>';
var gSign=stats.growth>=0?'+':'';
h+='<div class="cm-stats"><span class="cm-stat"><b>'+gSign+stats.growth+'</b> average growth</span><span class="cm-stat"><b>'+stats.projPct+'%</b> projected to meet target</span></div>';
h+='</div>';
return h;
}

function renderMonthsChart(months){
// Project current months of growth forward: rate so far (months / MO) extended to the full year (MT).
var projected=Math.round(months*MT/MO);
var mx=Math.round(MT*1.5); // room to show projections beyond a full year of growth
var cp=Math.min(100,months/mx*100);
var pp=Math.min(100,projected/mx*100);
var tp=MT/mx*100;
var status=projected>=MT?'on-track':'below';
var col=sc(status);
var h='<div class="cm"><div class="cm-name">Total months of growth</div><div class="cm-bar-wrap"><div class="cm-bar">';
if(pp>cp)h+='<div class="cm-proj" style="left:'+cp+'%;width:'+(pp-cp)+'%"><div class="cm-proj-i" style="background:'+slBg(col)+'"></div></div>';
h+='<div class="cm-fill" style="left:0%;width:'+cp+'%;background:'+col+'"></div>';
h+='<div class="cm-target" style="left:'+tp+'%"></div>';
var pills=pickVisiblePills([
{key:'projected',pct:pp,label:projected+' mo.',full:'Projected: '+projected+' months of growth'},
{key:'current',pct:cp,label:months+' mo.',full:'Current: '+months+' months of growth'}
]);
pills.forEach(function(p){h+='<div class="cm-pill" style="left:'+p.pct+'%;border-color:'+col+'" title="'+p.full+'">'+p.label+'</div>'});
h+='</div><div class="cm-target-pill" style="left:'+tp+'%" title="Target: '+MT+' months (full year of growth)">'+MT+' mo.</div></div>';
h+='<div class="cm-stats"><span class="cm-stat">projected <b>'+projected+' months</b> of growth by year-end</span></div>';
h+='</div>';
return h;
}

// Deterministic "since last week" trend for the prototype (no real week-over-week history).
function trendFor(value){return Math.max(1,Math.round(value*0.05))}

function projCard(label,value){
var t=trendFor(value);
return '<div class="mc"><div class="mc-l">'+label+'</div><div class="mc-v">'+value+'</div><div class="mc-s">by year-end</div><div class="mc-trend"><span class="pos">+'+t+'</span> since last week</div></div>';
}

// Three projected year-end summary cards for any scope of {student, gk} items.
function metricCards(scope){
var projMonths=Math.round(avgMopFor(scope)*MT/MO);
var w=metricAgg(scope,'wcpm');var f=metricAgg(scope,'hfw');
var h='<div class="metrics-row">';
h+=projCard('Projected months of growth',projMonths);
h+=projCard('Projected WCPM',w?w.projected:0);
h+=projCard('Projected HFW',f?f.projected:0);
h+='</div>';
return h;
}

function gsd(student,gk,mk){
var m=GM[gk].metrics[mk];var d=student[mk];if(!d)return null;
if(d.mastered){
return{name:student.name,teacher:student.teacher,current:d.c,boy:d.b,growth:0,projected:d.c,cs:'on-track',ps:'on-track',delta:m.t!==null?d.c-m.t:null,mastered:true}}
var cur=m.cap!==null?Math.min(d.c,m.cap):d.c;var gr=cur-d.b;
var pr=m.t!==null?proj(d.b,cur,m.cap):null;
var s2=m.t!==null?(pr>=m.t?'on-track':'below'):'on-track';
var dl=m.t!==null?pr-m.t:null;
return{name:student.name,teacher:student.teacher,current:cur,boy:d.b,growth:gr,projected:pr,cs:s2,ps:s2,delta:dl,mastered:false}}

function gradeStats(si,gk,mk){
var m=GM[gk].metrics[mk];var students=SCHOOLS[si].students[gk];
var all=students.map(function(s){return gsd(s,gk,mk)}).filter(Boolean);
if(!all.length)return{avg:0,avgGr:0,projMet:0,projPct:0,total:0};
var avg=Math.round(all.reduce(function(a,d){return a+d.current},0)/all.length);
// Exclude mastered students from average growth: they didn't need to grow
// (BOY was already at or above target), so including 0s would drag the
// average down and misrepresent the working students' progress.
var working=all.filter(function(d){return !d.mastered});
var avgGr=working.length?Math.round(working.reduce(function(a,d){return a+d.growth},0)/working.length):0;
var projMet=m.t!==null?all.filter(function(d){return d.projected>=m.t}).length:0;
var projPct=m.t!==null?Math.round(projMet/all.length*100):0;
return{avg:avg,avgGr:avgGr,projMet:projMet,projPct:projPct,total:all.length}}

function schoolGrades(si){return GKS.filter(function(gk){return SCHOOLS[si].students[gk].length>0})}

function schoolStats(si){
// "Projected to meet target" uses one representative metric per grade
// (DMET: PA for K, WCPM for 1st and 2nd) so each student is counted once.
var total=0,pm=0,pt=0;
schoolGrades(si).forEach(function(gk){
var s=gradeStats(si,gk,DMET[gk]);
pm+=s.projMet;pt+=s.total;
total+=SCHOOLS[si].students[gk].length;
});
return{total:total,projMet:pm,projTot:pt,projPct:pt?Math.round(pm/pt*100):0}}

function gradeOverallStats(si,gk){
var keys=Object.keys(GM[gk].metrics).filter(function(mk){return GM[gk].metrics[mk].key});
var pm=0,pt=0,tgr=0,gc=0;
keys.forEach(function(mk){
var s=gradeStats(si,gk,mk);pm+=s.projMet;pt+=s.total;tgr+=s.avgGr;gc++;
});
return{projPct:pt?Math.round(pm/pt*100):0,avgGr:gc?Math.round(tgr/gc):0}}

function renderDistrict(){
var app=document.getElementById('app');
var total=0,allPm=0,allPt=0,totalSeats=0;
SCHOOLS.forEach(function(sch,i){
var ss=schoolStats(i);total+=ss.total;allPm+=ss.projMet;allPt+=ss.projTot;totalSeats+=sch.seats;
});
var pct=allPt?Math.round(allPm/allPt*100):0;
var gTotals={k:0,g1:0,g2:0};SCHOOLS.forEach(function(sch){GKS.forEach(function(gk){gTotals[gk]+=sch.students[gk].length})});
var h='<div class="view-head"><div class="view-title">'+DISTRICT_NAME+'</div>'+seatsBlock(totalSeats)+'</div><div class="sub-counts"><span>'+total+' students</span>';
GKS.forEach(function(gk){if(gTotals[gk]>0)h+='<span>'+gTotals[gk]+' '+GM[gk].plural+'</span>'});
h+='</div>';
var dScope=[];SCHOOLS.forEach(function(sch){['g1','g2'].forEach(function(gk){sch.students[gk].forEach(function(s){dScope.push({student:s,gk:gk})})})});
var dCs=calloutFor(dScope,['wcpm','hfw']);
var dPers=dScope.length?'Your 1st and 2nd graders have made <b>'+dCs.avgMonths+' months</b> of progress so far this year, reading <b>'+dCs.growths.wcpm+' more</b> words correct per minute and mastering <b>'+dCs.growths.hfw+' more</b> high-frequency words on average.':'';
h+=calloutHtml(dPers);
var dAllScope=[];SCHOOLS.forEach(function(sch){GKS.forEach(function(gk){sch.students[gk].forEach(function(s){dAllScope.push({student:s,gk:gk})})})});
h+=metricCards(dAllScope);

SCHOOLS.forEach(function(sch,i){
var ss=schoolStats(i);
var schAllScope=[];GKS.forEach(function(gk){sch.students[gk].forEach(function(s){schAllScope.push({student:s,gk:gk})})});
var schMonths=avgMopFor(schAllScope);
var schWcpm=metricAgg(schAllScope,'wcpm');
var schHfw=metricAgg(schAllScope,'hfw');
h+='<div class="gc" onclick="navTo(\'school\','+i+')"><div class="gc-head"><div><span class="gc-name">'+sch.name+'</span><span class="gc-count">'+ss.total+' students</span></div><i class="ti ti-chevron-right gc-arrow" aria-hidden="true"></i></div><div class="gc-metrics">';
h+=renderMonthsChart(schMonths);
h+=renderMetricChart(schWcpm,'Words correct per minute');
h+=renderMetricChart(schHfw,'High-frequency words');
h+='</div></div>';
});
app.innerHTML=h}

function renderSchool(si){
var app=document.getElementById('app');
var sch=SCHOOLS[si];var ss=schoolStats(si);
var h='<button class="back-btn" onclick="navTo(\'district\')"><i class="ti ti-arrow-left" style="font-size:14px" aria-hidden="true"></i> '+DISTRICT_NAME+'</button>';
h+='<div class="view-head"><div class="view-title">'+sch.name+'</div>'+seatsBlock(sch.seats)+'</div>';
var sg=schoolGrades(si);
h+='<div class="sub-counts"><span>'+ss.total+' students</span>';
sg.forEach(function(gk){h+='<span>'+sch.students[gk].length+' '+GM[gk].plural+'</span>'});
h+='</div>';
var schScope=[];['g1','g2'].forEach(function(gk){sch.students[gk].forEach(function(s){schScope.push({student:s,gk:gk})})});
var schCs=calloutFor(schScope,['wcpm','hfw']);
var schPers=schScope.length?'Your 1st and 2nd graders have made <b>'+schCs.avgMonths+' months</b> of progress so far this year, reading <b>'+schCs.growths.wcpm+' more</b> words correct per minute and mastering <b>'+schCs.growths.hfw+' more</b> high-frequency words on average.':'';
h+=calloutHtml(schPers);
var schAllScope=[];GKS.forEach(function(gk){sch.students[gk].forEach(function(s){schAllScope.push({student:s,gk:gk})})});
h+=metricCards(schAllScope);

sg.forEach(function(gk){
var g=GM[gk];
var gScope=sch.students[gk].map(function(s){return{student:s,gk:gk}});
var gMonths=avgMopFor(gScope);
var gWcpm=metricAgg(gScope,'wcpm');
var gHfw=metricAgg(gScope,'hfw');
h+='<div class="gc" onclick="navTo(\'grade\','+si+',\''+gk+'\')"><div class="gc-head"><div><span class="gc-name">'+g.name+'</span><span class="gc-count">'+sch.students[gk].length+' students</span></div><i class="ti ti-chevron-right gc-arrow" aria-hidden="true"></i></div><div class="gc-metrics">';
h+=renderMonthsChart(gMonths);
h+=renderMetricChart(gWcpm,'Words correct per minute');
h+=renderMetricChart(gHfw,'High-frequency words');
h+='</div></div>';
});
app.innerHTML=h}

function renderGrade(si,gk){
var app=document.getElementById('app');
var sch=SCHOOLS[si];var g=GM[gk];var mk=st.gm[si][gk];var m=g.metrics[mk];var hasTarget=m.t!==null;
var keys=Object.keys(g.metrics);
var data=sch.students[gk].map(function(s){return gsd(s,gk,mk)}).filter(Boolean);

var h='<button class="back-btn" onclick="navTo(\'school\','+si+')"><i class="ti ti-arrow-left" style="font-size:14px" aria-hidden="true"></i> '+sch.name+'</button>';
h+='<div class="view-title">'+sch.name+' — '+g.name+'</div>';
h+='<div class="sub-counts"><span>'+data.length+' '+g.plural+'</span></div>';
var gScope=sch.students[gk].map(function(s){return{student:s,gk:gk}});
var gCs=calloutFor(gScope,['wcpm','hfw']);
var gPers;
if(gScope.length===0){gPers='';}
else{var gLabel=gk==='k'?'kindergartners':(gk==='g1'?'1st graders':'2nd graders');gPers='Your '+gLabel+' have made <b>'+gCs.avgMonths+' months</b> of progress so far this year, reading <b>'+gCs.growths.wcpm+' more</b> words correct per minute and mastering <b>'+gCs.growths.hfw+' more</b> high-frequency words on average.';}
h+=calloutHtml(gPers);
h+=metricCards(gScope);

h+='<div class="controls-row"><div class="controls-buttons">';
keys.forEach(function(k){var mi=g.metrics[k];h+='<button class="tb'+(k===mk?' active':'')+'" data-mk="'+k+'" data-si="'+si+'" data-gk="'+gk+'">'+mi.n+'</button>'});
h+='</div>';
h+='<select class="controls-select" id="metricSelect" aria-label="Choose metric">';
keys.forEach(function(k){var mi=g.metrics[k];h+='<option value="'+k+'"'+(k===mk?' selected':'')+'>'+mi.n+'</option>'});
h+='</select>';
h+='</div>';

h+='<div class="legend"><div class="legend-item"><div class="ld" style="background:#639922"></div> On track</div><div class="legend-item"><div class="ld" style="background:#E24B4A"></div> Below target</div>';
if(hasTarget)h+='<div class="legend-item" style="margin-left:8px"><div class="ll" style="background:var(--color-text-secondary)"></div> EOY target</div><div class="legend-item"><div class="ls"></div> Projected growth</div>';
h+='</div>';

var cN=hasTarget?'11%':'17%',cT=hasTarget?'9%':'13%',cS='8%',cCu='8%',cCh=hasTarget?'18%':'32%',cG='10%',cP='13%',cD='13%';
h+='<div class="tc"><table><thead><tr><th style="width:'+cN+'" data-sort="name">Student <span class="sa">&#9650;</span></th><th style="width:'+cT+'" data-sort="teacher">Teacher <span class="sa">&#9650;</span></th><th style="width:'+cS+';text-align:right" data-sort="boy">Start <span class="sa">&#9650;</span></th><th style="width:'+cCu+';text-align:right" data-sort="current">Current <span class="sa">&#9650;</span></th><th class="ch" style="width:'+cCh+'"></th><th style="width:'+cG+'" data-sort="growth">Growth <span class="sa">&#9650;</span></th>';
if(hasTarget)h+='<th style="width:'+cP+'" data-sort="projected">Projected EOY <span class="sa">&#9650;</span></th><th style="width:'+cD+'" data-sort="delta">vs. EOY target <span class="sa">&#9650;</span></th>';
h+='</tr></thead><tbody id="tb"></tbody></table></div>';
app.innerHTML=h;
bindGradeEvents(si,gk);
renderRows(si,gk)}

function renderRows(si,gk){
var mk=st.gm[si][gk];var m=GM[gk].metrics[mk];var hasTarget=m.t!==null;
var data=SCHOOLS[si].students[gk].map(function(s){return gsd(s,gk,mk)}).filter(Boolean);
data.sort(function(a,b){
// Mastered students always group at the bottom regardless of column sort.
if(a.mastered!==b.mastered)return a.mastered?1:-1;
var va=a[st.sort],vb=b[st.sort];
if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase()}
if(va<vb)return st.asc?-1:1;
if(va>vb)return st.asc?1:-1;
return 0
});
var tPct=hasTarget?Math.round(m.t/m.mx*100):0;
var rows='';
data.forEach(function(d){
if(d.mastered){
var nCols=hasTarget?6:4;
rows+='<tr><td class="sn">'+d.name+'</td><td class="tn">'+d.teacher+'</td>';
rows+='<td colspan="'+nCols+'" class="mastered-cell">Mastered at initial assessment</td>';
rows+='</tr>';
return;
}
var bPct=Math.max(0,Math.min(100,Math.round(d.boy/m.mx*100)));
var cPct=Math.min(100,Math.round(d.current/m.mx*100));
var pPct=hasTarget?Math.min(100,Math.round(d.projected/m.mx*100)):0;
var gSign=d.growth>=0?'+':'';var gCl=d.growth>=0?'pos':'neg';
var bCol=sc(d.cs);
rows+='<tr><td class="sn">'+d.name+'</td><td class="tn">'+d.teacher+'</td>';
rows+='<td class="bv">'+d.boy+'</td>';
rows+='<td class="cv">'+d.current+'</td>';
rows+='<td class="ch"><div class="bb">';
if(hasTarget&&pPct>cPct)rows+='<div class="bp" style="left:'+cPct+'%;width:'+(pPct-cPct)+'%"><div class="bp-i" style="background:'+slBg(bCol)+'"></div></div>';
rows+='<div class="bf" style="left:'+bPct+'%;width:'+(cPct-bPct)+'%;background:'+bCol+'"></div>';
rows+='<div class="bs" style="left:'+bPct+'%;border-color:'+bCol+'"></div>';
if(hasTarget)rows+='<div class="bl" style="left:'+tPct+'%"></div>';
rows+='</div></td>';
rows+='<td><span class="gv '+gCl+'">'+gSign+d.growth+'</span></td>';
if(hasTarget){var pCol=sc(d.ps);var dSign=d.delta>=0?'+':'';var dCl=d.delta>=0?'pos':'neg';
rows+='<td class="pc"><span class="ps" style="background:'+pCol+'"></span>'+d.projected+'</td>';
rows+='<td class="dc '+dCl+'">'+dSign+d.delta+'</td>'}
rows+='</tr>'});
document.getElementById('tb').innerHTML=rows;
document.querySelectorAll('th').forEach(function(th){th.classList.toggle('sorted',th.dataset.sort===st.sort);var a=th.querySelector('.sa');if(a)a.innerHTML=(th.dataset.sort===st.sort&&!st.asc)?'&#9660;':'&#9650;'})}

function bindGradeEvents(si,gk){
document.querySelectorAll('.tb').forEach(function(btn){btn.addEventListener('click',function(){st.gm[si][gk]=btn.dataset.mk;st.sort='name';st.asc=true;st.filter='all';renderGrade(si,gk)})});
var sel=document.getElementById('metricSelect');
if(sel)sel.addEventListener('change',function(){st.gm[si][gk]=sel.value;st.sort='name';st.asc=true;st.filter='all';renderGrade(si,gk)});
document.querySelectorAll('th[data-sort]').forEach(function(th){th.addEventListener('click',function(){var col=th.dataset.sort;if(st.sort===col)st.asc=!st.asc;else{st.sort=col;st.asc=true}renderRows(si,gk)})})}

window.navTo=function(view,si,gk){
st.view=view;st.si=si!==undefined?si:null;st.gk=gk||null;st.sort='name';st.asc=true;st.filter='all';render()};

function render(){
if(st.view==='district')renderDistrict();
else if(st.view==='school')renderSchool(st.si);
else renderGrade(st.si,st.gk);
}
render();
</script>
</body>
</html>
