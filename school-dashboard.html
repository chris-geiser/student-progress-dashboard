<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Reading Progress Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-serif: Georgia, 'Times New Roman', serif;
  --font-mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f4f0;
  --color-background-tertiary: #eae9e5;
  --color-background-info: #E6F1FB;
  --color-background-danger: #FCEBEB;
  --color-background-success: #EAF3DE;
  --color-background-warning: #FAEEDA;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666663;
  --color-text-tertiary: #999996;
  --color-text-info: #185FA5;
  --color-text-danger: #A32D2D;
  --color-text-success: #3B6D11;
  --color-text-warning: #854F0B;
  --color-border-primary: rgba(0,0,0,0.4);
  --color-border-secondary: rgba(0,0,0,0.3);
  --color-border-tertiary: rgba(0,0,0,0.15);
  --color-border-info: #85B7EB;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #2c2c2a;
    --color-background-secondary: #363633;
    --color-background-tertiary: #1e1e1c;
    --color-background-info: #0C447C;
    --color-background-danger: #501313;
    --color-background-success: #173404;
    --color-background-warning: #412402;
    --color-text-primary: #f0efe8;
    --color-text-secondary: #a8a8a3;
    --color-text-tertiary: #7a7a76;
    --color-text-info: #85B7EB;
    --color-text-danger: #F09595;
    --color-text-success: #97C459;
    --color-text-warning: #FAC775;
    --color-border-primary: rgba(255,255,255,0.4);
    --color-border-secondary: rgba(255,255,255,0.3);
    --color-border-tertiary: rgba(255,255,255,0.15);
    --color-border-info: #378ADD;
  }
}
html { background: var(--color-background-tertiary); }
body {
  font-family: var(--font-sans);
  margin: 0;
  padding: 2rem;
  color: var(--color-text-primary);
  max-width: 780px;
  margin: 0 auto;
}
*{box-sizing:border-box;margin:0;padding:0}
.dash{padding:0.5rem 0}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.metrics-row-4{grid-template-columns:repeat(4,1fr)}
.mc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem 1rem}
.mc-l{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.mc-v{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.mc-s{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--color-text-info);cursor:pointer;margin-bottom:1rem;background:none;border:none;font-family:var(--font-sans);padding:0}
.back-btn:hover{text-decoration:underline}
.grade-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.5rem}
.gc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:12px;cursor:pointer;transition:border-color 0.15s}
.gc:hover{border-color:var(--color-border-secondary)}
.gc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gc-name{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.gc-count{font-size:13px;color:var(--color-text-secondary);margin-left:8px}
.gc-arrow{font-size:18px;color:var(--color-text-tertiary)}
.gc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mm{padding:0}
.mm-name{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.mm-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mm-bar-bg{flex:1;height:8px;background:var(--color-background-secondary);border-radius:4px;position:relative;overflow:visible}
.mm-bar-fill{height:100%;border-radius:4px}
.mm-bench{position:absolute;top:-2px;height:12px;width:2px;border-radius:1px;background:var(--color-text-secondary)}
.mm-val{font-size:13px;font-weight:500;white-space:nowrap;min-width:50px;text-align:right}
.mm-val .t{color:var(--color-text-tertiary);font-weight:400}
.mm-stats{display:flex;flex-direction:column;gap:2px}
.mm-stat{font-size:12px;color:var(--color-text-secondary)}
.mm-stat b{font-weight:500}
.controls-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.tb{padding:6px 14px;font-size:13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans)}
.tb.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.fl{font-size:12px;color:var(--color-text-secondary);margin-left:auto}
.controls-row select{font-size:13px;padding:5px 8px;font-family:var(--font-sans);margin-left:4px;background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md)}
.legend{display:flex;gap:14px;margin-bottom:1rem;font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px}
.ld{width:8px;height:8px;border-radius:2px}
.ll{width:8px;height:2.5px;border-radius:1px}
.ls{width:16px;height:10px;border-radius:2px;background:repeating-linear-gradient(45deg,#888780 0px,#888780 2px,transparent 2px,transparent 6px)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:8px 10px;font-weight:500;font-size:12px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--color-text-primary)}
th .sa{font-size:10px;margin-left:3px;opacity:0.4}
th.sorted .sa{opacity:1}
td{padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
.sn{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bw{display:flex;align-items:center;gap:8px}
.bb{flex:1;height:12px;background:var(--color-background-secondary);border-radius:6px;min-width:60px;overflow:visible;position:relative}
.bf{position:absolute;top:0;left:0;height:100%;border-radius:6px;z-index:2}
.bp{position:absolute;top:0;left:0;height:100%;border-radius:6px;z-index:1;overflow:hidden}
.bp-i{width:100%;height:100%}
.bl{position:absolute;top:-3px;height:18px;width:2px;z-index:3;border-radius:1px;background:var(--color-text-secondary)}
.sv{min-width:30px;text-align:right;font-size:13px;font-weight:500;white-space:nowrap}
.gv{font-size:13px;font-weight:500}
.pos{color:#639922}.neg{color:#E24B4A}
@media(prefers-color-scheme:dark){.pos{color:#97C459}.neg{color:#F09595}}
.pc{font-size:13px;white-space:nowrap}
.ps{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dc{font-size:13px;font-weight:500}
</style>
</head>
<body>
<div class="dash" id="app"></div>
<script>
var MO=4,MT=10;
var G={
k:{name:"Kindergarten",metrics:{
pa:{n:"Phonological awareness",t:35,b:14,mx:45,u:"sounds",cap:null,key:1},
lnf:{n:"Letter naming fluency",t:42,b:17,mx:55,u:"letters/min",cap:null,key:1},
wcpm:{n:"Words correct per minute",t:null,b:null,mx:15,u:"WCPM",cap:null,key:0},
hfw:{n:"High-frequency words",t:null,b:null,mx:25,u:"HF words",cap:null,key:0}},
students:[
{name:"Ava T.",pa:{b:5,c:18},lnf:{b:8,c:24},wcpm:{b:0,c:3},hfw:{b:0,c:8}},
{name:"Ben K.",pa:{b:3,c:17},lnf:{b:5,c:21},wcpm:{b:0,c:1},hfw:{b:0,c:2}},
{name:"Chloe M.",pa:{b:8,c:22},lnf:{b:12,c:30},wcpm:{b:0,c:5},hfw:{b:0,c:12}},
{name:"Dylan R.",pa:{b:2,c:11},lnf:{b:3,c:13},wcpm:{b:0,c:0},hfw:{b:0,c:0}},
{name:"Emma S.",pa:{b:6,c:18},lnf:{b:7,c:21},wcpm:{b:0,c:2},hfw:{b:0,c:5}},
{name:"Finn L.",pa:{b:4,c:17},lnf:{b:6,c:21},wcpm:{b:0,c:1},hfw:{b:0,c:1}},
{name:"Grace W.",pa:{b:7,c:20},lnf:{b:10,c:26},wcpm:{b:0,c:4},hfw:{b:0,c:10}},
{name:"Hugo P.",pa:{b:1,c:9},lnf:{b:2,c:11},wcpm:{b:0,c:0},hfw:{b:0,c:0}}]},
g1:{name:"1st Grade",metrics:{
wcpm:{n:"Words correct per minute",t:42,b:17,mx:58,u:"WCPM",cap:null,key:1},
hfw:{n:"High-frequency words",t:200,b:80,mx:220,u:"HF words",cap:200,key:1}},
students:[
{name:"Aiden M.",wcpm:{b:8,c:22},hfw:{b:18,c:95}},
{name:"Bella R.",wcpm:{b:12,c:26},hfw:{b:30,c:105}},
{name:"Carlos D.",wcpm:{b:5,c:16},hfw:{b:12,c:68}},
{name:"Daisy L.",wcpm:{b:10,c:26},hfw:{b:25,c:105}},
{name:"Ethan W.",wcpm:{b:7,c:21},hfw:{b:20,c:93}},
{name:"Fatima K.",wcpm:{b:14,c:28},hfw:{b:35,c:115}},
{name:"Gabriela S.",wcpm:{b:6,c:17},hfw:{b:15,c:72}},
{name:"Henry T.",wcpm:{b:11,c:24},hfw:{b:28,c:98}},
{name:"Isabella P.",wcpm:{b:9,c:24},hfw:{b:22,c:98}},
{name:"Jayden C.",wcpm:{b:4,c:14},hfw:{b:10,c:58}},
{name:"Kayla N.",wcpm:{b:13,c:27},hfw:{b:32,c:108}},
{name:"Liam B.",wcpm:{b:8,c:22},hfw:{b:19,c:92}},
{name:"Maya H.",wcpm:{b:10,c:23},hfw:{b:26,c:90}},
{name:"Noah F.",wcpm:{b:6,c:18},hfw:{b:14,c:72}},
{name:"Olivia J.",wcpm:{b:15,c:30},hfw:{b:38,c:120}},
{name:"Preston G.",wcpm:{b:3,c:13},hfw:{b:8,c:52}},
{name:"Quinn A.",wcpm:{b:11,c:24},hfw:{b:27,c:98}},
{name:"Rosa V.",wcpm:{b:7,c:19},hfw:{b:17,c:78}},
{name:"Sam E.",wcpm:{b:9,c:21},hfw:{b:24,c:88}},
{name:"Tiana W.",wcpm:{b:5,c:15},hfw:{b:11,c:62}}]},
g2:{name:"2nd Grade",metrics:{
wcpm:{n:"Words correct per minute",t:90,b:40,mx:110,u:"WCPM",cap:null,key:1},
hfw:{n:"High-frequency words",t:200,b:120,mx:220,u:"HF words",cap:200,key:1}},
students:[
{name:"Alex B.",wcpm:{b:30,c:55},hfw:{b:90,c:140}},
{name:"Brooklyn C.",wcpm:{b:25,c:52},hfw:{b:75,c:126}},
{name:"Charlie D.",wcpm:{b:35,c:58},hfw:{b:100,c:155}},
{name:"Diana F.",wcpm:{b:20,c:38},hfw:{b:60,c:105}},
{name:"Eli G.",wcpm:{b:40,c:60},hfw:{b:110,c:165}},
{name:"Freya H.",wcpm:{b:22,c:40},hfw:{b:70,c:123}},
{name:"George J.",wcpm:{b:45,c:64},hfw:{b:120,c:170}}]}
};
var st={view:'school',gm:{k:'pa',g1:'wcpm',g2:'wcpm'},sort:'name',asc:true,filter:'all'};
function sc(s){return s==='on-track'?'#639922':s==='approaching'?'#EF9F27':'#E24B4A'}
function gs(v,b){if(!b)return'on-track';var p=v/b;return p>=0.9?'on-track':p>=0.7?'approaching':'below'}
function proj(boy,cur,cap){var r=(cur-boy)/MO;var p=Math.round(boy+r*MT);if(cap!==null)p=Math.min(p,cap);return p}
function slBg(c){return'repeating-linear-gradient(45deg,'+c+' 0px,'+c+' 2px,transparent 2px,transparent 6px)'}
function gsd(s,gk,mk){var m=G[gk].metrics[mk];var d=s[mk];if(!d)return null;var cur=m.cap!==null?Math.min(d.c,m.cap):d.c;var gr=cur-d.b;var pr=m.t!==null?proj(d.b,cur,m.cap):null;var cs=gs(cur,m.b);var ps=m.t!==null?gs(pr,m.t):null;var dl=m.t!==null?pr-m.t:null;return{name:s.name,current:cur,boy:d.b,growth:gr,projected:pr,cs:cs,ps:ps,delta:dl}}
function gradeStats(gk,mk){var m=G[gk].metrics[mk];var all=G[gk].students.map(function(s){return gsd(s,gk,mk)}).filter(Boolean);if(!all.length)return{avg:0,avgGr:0,projMet:0,projPct:0,total:0};var avg=Math.round(all.reduce(function(a,d){return a+d.current},0)/all.length);var avgGr=Math.round(all.reduce(function(a,d){return a+d.growth},0)/all.length);var projMet=m.t!==null?all.filter(function(d){return d.projected>=m.t}).length:0;var projPct=m.t!==null?Math.round(projMet/all.length*100):0;return{avg:avg,avgGr:avgGr,projMet:projMet,projPct:projPct,total:all.length}}
function renderSchool(){
var app=document.getElementById('app');
var total=0;var allProj=0;var allTot=0;
['k','g1','g2'].forEach(function(gk){var keys=Object.keys(G[gk].metrics).filter(function(mk){return G[gk].metrics[mk].key});keys.forEach(function(mk){var s=gradeStats(gk,mk);allProj+=s.projMet;allTot+=s.total});total+=G[gk].students.length});
var pct=allTot?Math.round(allProj/allTot*100):0;
var h='<div class="metrics-row"><div class="mc"><div class="mc-l">Total students</div><div class="mc-v">'+total+'</div><div class="mc-s">across 3 grade levels</div></div>';
h+='<div class="mc"><div class="mc-l">Projected to meet target</div><div class="mc-v">'+pct+'%</div><div class="mc-s">'+allProj+' of '+total+' students</div></div>';
h+='<div class="mc"><div class="mc-l">Open seats</div><div class="mc-v">0</div><div class="mc-s">all seats filled</div></div></div>';
['k','g1','g2'].forEach(function(gk){
var g=G[gk];var keys=Object.keys(g.metrics).filter(function(mk){return g.metrics[mk].key});
h+='<div class="gc" onclick="navTo(\''+gk+'\')"><div class="gc-head"><div><span class="gc-name">'+g.name+'</span><span class="gc-count">'+g.students.length+' students</span></div><i class="ti ti-chevron-right gc-arrow" aria-hidden="true"></i></div><div class="gc-metrics">';
keys.forEach(function(mk){
var m=g.metrics[mk];var s=gradeStats(gk,mk);var avgPct=Math.min(100,Math.round(s.avg/m.mx*100));var tPct=Math.round(m.t/m.mx*100);var col=sc(gs(s.avg,m.b));
h+='<div class="mm"><div class="mm-name">Average '+m.n.toLowerCase()+'</div><div class="mm-bar-wrap"><div class="mm-bar-bg"><div class="mm-bar-fill" style="width:'+avgPct+'%;background:'+col+';border-radius:4px"></div><div class="mm-bench" style="left:'+tPct+'%"></div></div><div class="mm-val">'+s.avg+'<span class="t"> / '+m.t+'</span></div></div><div class="mm-stats"><div class="mm-stat"><b>+'+s.avgGr+'</b> average growth</div><div class="mm-stat"><b>'+s.projPct+'%</b> projected to meet target</div></div></div>'});
h+='</div></div>'});
app.innerHTML=h}
function renderGrade(gk){
var g=G[gk];var mk=st.gm[gk];var m=g.metrics[mk];var hasTarget=m.t!==null;
var keys=Object.keys(g.metrics);
var data=g.students.map(function(s){return gsd(s,gk,mk)}).filter(Boolean);
var avg=data.length?Math.round(data.reduce(function(a,d){return a+d.current},0)/data.length):0;
var avgGr=data.length?Math.round(data.reduce(function(a,d){return a+d.growth},0)/data.length):0;
var projMet=hasTarget?data.filter(function(d){return d.projected>=m.t}).length:0;
var projPct=hasTarget&&data.length?Math.round(projMet/data.length*100):0;
var h='<button class="back-btn" onclick="navTo(\'school\')"><i class="ti ti-arrow-left" style="font-size:14px" aria-hidden="true"></i> All grades</button>';
h+='<div class="grade-title">'+g.name+'</div>';
h+='<div class="metrics-row"><div class="mc"><div class="mc-l">Class average</div><div class="mc-v">'+avg+(hasTarget?'<span style="font-size:13px;font-weight:400;color:var(--color-text-tertiary)">/'+m.b+'</span>':'')+'</div><div class="mc-s">'+m.u+(hasTarget?' vs. expected benchmark':'')+'</div></div>';
h+='<div class="mc"><div class="mc-l">Average growth (BOY to now)</div><div class="mc-v">+'+avgGr+'</div><div class="mc-s">'+m.u+'</div></div>';
if(hasTarget){h+='<div class="mc"><div class="mc-l">Projected to meet target</div><div class="mc-v">'+projPct+'%</div><div class="mc-s">'+projMet+' of '+data.length+' students</div></div>'}
else{h+='<div class="mc"><div class="mc-l">Students with growth</div><div class="mc-v">'+data.filter(function(d){return d.growth>0}).length+'</div><div class="mc-s">of '+data.length+' students</div></div>'}
h+='</div>';
h+='<div class="controls-row">';
keys.forEach(function(k){var mi=g.metrics[k];h+='<button class="tb'+(k===mk?' active':'')+'" data-mk="'+k+'" data-gk="'+gk+'">'+mi.n+(mi.key?'':' *')+'</button>'});
h+='<span class="fl">Show:</span><select id="sf"><option value="all">All students</option><option value="on-track"'+(st.filter==='on-track'?' selected':'')+'>On track</option><option value="approaching"'+(st.filter==='approaching'?' selected':'')+'>Approaching</option><option value="below"'+(st.filter==='below'?' selected':'')+'>Below benchmark</option></select></div>';
h+='<div class="legend"><div class="legend-item"><div class="ld" style="background:#639922"></div> On track</div><div class="legend-item"><div class="ld" style="background:#EF9F27"></div> Approaching</div><div class="legend-item"><div class="ld" style="background:#E24B4A"></div> Below benchmark</div>';
if(hasTarget)h+='<div class="legend-item" style="margin-left:8px"><div class="ll" style="background:var(--color-text-secondary)"></div> EOY target</div><div class="legend-item"><div class="ls"></div> Projected growth</div>';
h+='</div>';
if(!m.key)h+='<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:1rem;font-style:italic">* Emerging measure for '+g.name+'. No formal EOY target.</div>';
var cN=hasTarget?'15%':'20%',cC=hasTarget?'35%':'44%',cG='11%',cP='16%',cD='16%';
h+='<table><thead><tr><th style="width:'+cN+'" data-sort="name">Student <span class="sa">&#9650;</span></th><th style="width:'+cC+'" data-sort="current">Current <span class="sa">&#9650;</span></th><th style="width:'+cG+'" data-sort="growth">Growth <span class="sa">&#9650;</span></th>';
if(hasTarget)h+='<th style="width:'+cP+'" data-sort="projected">Projected EOY <span class="sa">&#9650;</span></th><th style="width:'+cD+'" data-sort="delta">vs. EOY target <span class="sa">&#9650;</span></th>';
h+='</tr></thead><tbody id="tb"></tbody></table>';
app.innerHTML=h;
bindGradeEvents(gk);
renderRows(gk)}
function renderRows(gk){
var mk=st.gm[gk];var m=G[gk].metrics[mk];var hasTarget=m.t!==null;
var data=G[gk].students.map(function(s){return gsd(s,gk,mk)}).filter(Boolean);
if(st.filter!=='all')data=data.filter(function(d){return d.cs===st.filter});
data.sort(function(a,b){var va=a[st.sort],vb=b[st.sort];if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase()}if(va<vb)return st.asc?-1:1;if(va>vb)return st.asc?1:-1;return 0});
var tPct=hasTarget?Math.round(m.t/m.mx*100):0;
var rows='';
data.forEach(function(d){
var cPct=Math.min(100,Math.round(d.current/m.mx*100));
var pPct=hasTarget?Math.min(100,Math.round(d.projected/m.mx*100)):0;
var gSign=d.growth>=0?'+':'';var gCl=d.growth>=0?'pos':'neg';
var bCol=sc(d.cs);
rows+='<tr><td class="sn">'+d.name+'</td><td><div class="bw"><div class="bb">';
if(hasTarget&&pPct>cPct)rows+='<div class="bp" style="width:'+pPct+'%"><div class="bp-i" style="background:'+slBg(bCol)+'"></div></div>';
rows+='<div class="bf" style="width:'+cPct+'%;background:'+bCol+'"></div>';
if(hasTarget)rows+='<div class="bl" style="left:'+tPct+'%"></div>';
rows+='</div><div class="sv">'+d.current+'</div></div></td>';
rows+='<td><span class="gv '+gCl+'">'+gSign+d.growth+'</span></td>';
if(hasTarget){var pCol=sc(d.ps);var dSign=d.delta>=0?'+':'';var dCl=d.delta>=0?'pos':'neg';
rows+='<td class="pc"><span class="ps" style="background:'+pCol+'"></span>'+d.projected+'</td>';
rows+='<td class="dc '+dCl+'">'+dSign+d.delta+'</td>'}
rows+='</tr>'});
document.getElementById('tb').innerHTML=rows;
document.querySelectorAll('th').forEach(function(th){th.classList.toggle('sorted',th.dataset.sort===st.sort);var a=th.querySelector('.sa');if(a)a.innerHTML=(th.dataset.sort===st.sort&&!st.asc)?'&#9660;':'&#9650;'})}
function bindGradeEvents(gk){
document.querySelectorAll('.tb').forEach(function(btn){btn.addEventListener('click',function(){st.gm[gk]=btn.dataset.mk;st.sort='name';st.asc=true;st.filter='all';renderGrade(gk)})});
document.querySelectorAll('th[data-sort]').forEach(function(th){th.addEventListener('click',function(){var col=th.dataset.sort;if(st.sort===col)st.asc=!st.asc;else{st.sort=col;st.asc=true}renderRows(gk)})});
var sf=document.getElementById('sf');if(sf)sf.addEventListener('change',function(e){st.filter=e.target.value;renderRows(gk)})}
window.navTo=function(v){st.view=v;st.sort='name';st.asc=true;st.filter='all';render()};
function render(){st.view==='school'?renderSchool():renderGrade(st.view)}
render();
</script>
</body>
